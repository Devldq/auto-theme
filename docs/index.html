<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>auto-theme — 63+ World-Class Design Systems</title>
  <meta name="description" content="Browse 63+ reverse-engineered design systems from the world's best tech companies. Drop theme-presets.json into your AI and get a full theme switcher in minutes." />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --text: #e8e8f0;
      --text2: #9898b0;
      --accent: #a855f7;
      --accent-glow: rgba(168,85,247,0.18);
      --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,15,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      color: var(--text);
      white-space: nowrap;
    }
    .header-logo span { font-size: 20px; }
    .header-filters {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .filter-btn:hover { color: var(--text); background: var(--surface2); }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .header-count {
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .header-search {
      flex: 1;
      max-width: 280px;
      margin-left: auto;
      position: relative;
    }
    .header-search input {
      width: 100%;
      padding: 6px 12px 6px 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .header-search input:focus { border-color: var(--accent); }
    .header-search input::placeholder { color: var(--text2); }
    .header-search svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
      pointer-events: none;
    }
    .github-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .github-btn:hover { color: var(--text); border-color: var(--text2); }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 64px 24px 48px;
      background: radial-gradient(ellipse 800px 400px at 50% 0%, rgba(168,85,247,0.08) 0%, transparent 70%);
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid rgba(168,85,247,0.3);
      background: rgba(168,85,247,0.08);
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #e8e8f0 0%, #9898b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 16px;
      color: var(--text2);
      max-width: 560px;
      margin: 0 auto 28px;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 99px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 0 24px var(--accent-glow);
      transition: opacity 0.15s, transform 0.15s;
    }
    .hero-cta:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── Grid ── */
    .grid-section {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--text2);
    }

    /* ── Theme Card ── */
    .card {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      border-color: rgba(168,85,247,0.4);
    }
    .card-preview {
      height: 120px;
      position: relative;
      overflow: hidden;
      display: flex;
    }
    /* mock sidebar */
    .card-sidebar {
      width: 40px;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 7px;
    }
    .card-sidebar-dot {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      opacity: 0.5;
    }
    .card-sidebar-dot.active { opacity: 1; }
    /* mock main */
    .card-main {
      flex: 1;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .card-mock-line {
      height: 7px;
      border-radius: 3px;
      opacity: 0.6;
    }
    .card-mock-line.w60 { width: 60%; }
    .card-mock-line.w80 { width: 80%; }
    .card-mock-line.w40 { width: 40%; }
    .card-mock-line.accent-line { opacity: 1; }

    .card-footer {
      padding: 12px 14px 14px;
      background: var(--surface);
    }
    .card-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }
    .card-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.1);
    }
    .card-mode-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
    }
    .card-arrow {
      position: absolute;
      bottom: 14px;
      right: 14px;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-size: 11px;
      transition: background 0.15s;
    }
    .card:hover .card-arrow { background: rgba(255,255,255,0.14); }

    /* ── Preview Panel ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.visible { opacity: 1; pointer-events: all; }

    .panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(780px, 100vw);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    .panel.visible { transform: translateX(0); }

    .panel-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid;
      flex-shrink: 0;
      gap: 12px;
    }
    .panel-title-block { display: flex; flex-direction: column; gap: 2px; }
    .panel-title { font-weight: 700; font-size: 16px; }
    .panel-subtitle { font-size: 12px; opacity: 0.6; }
    .panel-actions { display: flex; gap: 8px; align-items: center; }
    .mode-toggle {
      display: flex;
      border-radius: 8px;
      border: 1px solid;
      overflow: hidden;
    }
    .mode-btn {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .copy-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .copy-btn:hover { opacity: 0.8; }
    .panel-close {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .panel-close:hover { opacity: 0.7; }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Mock App inside panel */
    .mock-app {
      display: flex;
      flex: 1;
      min-height: 0;
      height: 100%;
    }
    .mock-sidebar {
      width: 200px;
      flex-shrink: 0;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-right: 1px solid;
    }
    .mock-sidebar-logo {
      font-size: 13px;
      font-weight: 700;
      padding: 6px 8px 14px;
      opacity: 0.9;
    }
    .mock-nav-item {
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
      transition: background 0.12s;
    }
    .mock-nav-item.active { font-weight: 600; }
    .mock-nav-icon { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    .mock-content {
      flex: 1;
      padding: 24px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .mock-content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .mock-h1 { font-size: 20px; font-weight: 700; }
    .mock-btn {
      padding: 7px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: default;
      font-family: inherit;
    }
    .mock-btn-ghost {
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid;
      font-size: 13px;
      background: transparent;
      cursor: default;
      font-family: inherit;
    }
    .mock-cards-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .mock-stat-card {
      border-radius: 10px;
      padding: 16px;
      border: 1px solid;
    }
    .mock-stat-label { font-size: 11px; opacity: 0.55; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .mock-stat-val { font-size: 22px; font-weight: 700; }
    .mock-stat-sub { font-size: 11px; opacity: 0.55; margin-top: 3px; }
    .mock-table {
      border-radius: 10px;
      border: 1px solid;
      overflow: hidden;
    }
    .mock-table-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.5;
      border-bottom: 1px solid;
    }
    .mock-table-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      padding: 11px 16px;
      font-size: 13px;
      border-bottom: 1px solid;
      align-items: center;
    }
    .mock-table-row:last-child { border-bottom: none; }
    .mock-badge {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
    }
    .mock-input-row {
      display: flex;
      gap: 8px;
    }
    .mock-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid;
      font-size: 13px;
      font-family: inherit;
    }
    /* tokens section */
    .tokens-section {
      padding: 16px 20px;
      border-top: 1px solid;
    }
    .tokens-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.5;
      margin-bottom: 10px;
    }
    .tokens-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 6px;
    }
    .token-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
    }
    .token-swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(128,128,128,0.2);
      flex-shrink: 0;
    }
    .token-name { opacity: 0.6; }
    .token-val { font-family: monospace; font-size: 11px; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: var(--text2);
      font-size: 14px;
      gap: 10px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--text);
      color: var(--bg);
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Responsive */
    @media (max-width: 640px) {
      .header-search { display: none; }
      .github-btn { display: none; }
      .mock-sidebar { display: none; }
      .mock-cards-row { grid-template-columns: 1fr 1fr; }
      .panel { width: 100vw; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <a class="header-logo" href="https://github.com/Devldq/auto-theme" target="_blank">
    <span>🎨</span> auto-theme
  </a>
  <div class="header-filters">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="light">☀ 亮色</button>

  </div>
  <span class="header-count" id="count-label">— 款</span>
  <div class="header-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>

<!-- Hero -->
<section class="hero">
  <div class="hero-badge">✦ 63+ 世界级设计系统</div>

  <p>把 <code style="background:rgba(168,85,247,0.12);color:#c084fc;padding:2px 6px;border-radius:4px;font-size:14px;">theme-presets.json</code> 丢给你的 AI，几分钟内为任意应用生成完整主题切换器。</p>

<!-- Preview Panel -->

  <div class="panel-toolbar" id="panel-toolbar">

      <div class="panel-title" id="panel-title">Theme</div>
      <div class="panel-subtitle" id="panel-desc"></div>
    </div>
    <div class="panel-actions">
      <div class="mode-toggle" id="mode-toggle">
        <button class="mode-btn" id="btn-light" onclick="setMode('light')">☀ Light</button>
        <button class="mode-btn" id="btn-dark" onclick="setMode('dark')">🌙 Dark</button>
      </div>
      <button class="copy-btn" id="copy-btn" onclick="copyTokens()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        复制 JSON
      </button>

  <div class="panel-body" id="panel-body"></div>

<!-- Toast -->
<div class="toast" id="toast">✓ 已复制到剪贴板</div>

<script>
  let allThemes = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let activeTheme = null;
  let activeMode = 'dark';

  // ── Load data ──
  async function init() {
    try {
      const res = await fetch('./theme-presets.json');
      allThemes = await res.json();
      renderGrid();
    } catch(e) {
      document.getElementById('theme-grid').innerHTML =
        '<div class="empty-state">⚠️ 加载失败，请在本地服务器环境下访问</div>';
    }
  }

  // ── Render Grid ──
  function renderGrid() {
    const grid = document.getElementById('theme-grid');
    let themes = allThemes;

    if (currentFilter === 'light') {
      themes = themes.filter(t => t.light && t.light.background);
    } else if (currentFilter === 'dark') {
      themes = themes.filter(t => t.dark && t.dark.background);
    }
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      themes = themes.filter(t =>
        t.name.toLowerCase().includes(q) ||
        (t.description && t.description.toLowerCase().includes(q))
      );
    }

    document.getElementById('count-label').textContent = `${themes.length} 款`;

    if (!themes.length) {
      grid.innerHTML = '<div class="empty-state">没有匹配的主题</div>';
      return;
    }

    grid.innerHTML = themes.map(t => cardHTML(t)).join('');
    grid.querySelectorAll('.card').forEach((el, i) => {
      el.addEventListener('click', () => openPanel(themes[i]));
    });
  }

  function cardHTML(t) {
    const mode = t.dark ? 'dark' : 'light';
    const tokens = t[mode] || {};
    const p = t.preview || {};

    const bg = p.bg || tokens.background || '#111';
    const surf = p.surface || tokens.surface || '#1a1a1a';
    const acc = p.accent || tokens.accent || '#888';
    const txt = p.text || tokens.textPrimary || '#eee';
    const brd = p.border || tokens.border || '#333';
    const sidebarBg = tokens.sidebar?.background || surf;

    const hasBoth = t.light && t.dark;
    const modeLabel = hasBoth ? 'Light + Dark' : (t.dark ? 'Dark' : 'Light');

    return `
    <div class="card">
      <div class="card-preview" style="background:${bg}">
        <div class="card-sidebar" style="background:${sidebarBg};border-right:1px solid ${brd}">
          <div class="card-sidebar-dot active" style="background:${acc}"></div>
          <div class="card-sidebar-dot" style="background:${txt}"></div>
          <div class="card-sidebar-dot" style="background:${txt}"></div>
          <div class="card-sidebar-dot" style="background:${txt}"></div>
        </div>
        <div class="card-main">
          <div class="card-mock-line w80" style="background:${txt}"></div>
          <div class="card-mock-line w60" style="background:${txt}"></div>
          <div class="card-mock-line accent-line w40" style="background:${acc};height:20px;border-radius:5px"></div>
          <div class="card-mock-line w80" style="background:${txt}"></div>
          <div class="card-mock-line w60" style="background:${txt}"></div>
        </div>
        <span class="card-mode-badge">${modeLabel}</span>
      </div>
      <div class="card-footer" style="background:${surf};border-top:1px solid ${brd}">
        <div class="card-name" style="color:${txt}">${t.name}</div>
        <div class="card-desc" style="color:${txt}88">${t.description || ''}</div>
        <div class="card-dots">
          <div class="dot" style="background:${bg}"></div>
          <div class="dot" style="background:${surf}"></div>
          <div class="dot" style="background:${acc}"></div>
          <div class="dot" style="background:${txt}"></div>
          <div class="dot" style="background:${brd}"></div>
        </div>
        <div class="card-arrow">↗</div>
      </div>
    </div>`;
  }

  // ── Panel ──
  function openPanel(theme) {
    activeTheme = theme;
    activeMode = theme.dark ? 'dark' : 'light';
    renderPanel();
    document.getElementById('panel').classList.add('visible');
    document.getElementById('overlay').classList.add('visible');
    document.body.style.overflow = 'hidden';
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('visible');
    document.getElementById('overlay').classList.remove('visible');
    document.body.style.overflow = '';
    activeTheme = null;
  }

  function setMode(mode) {
    if (!activeTheme) return;
    if (mode === 'light' && !activeTheme.light) return;
    if (mode === 'dark' && !activeTheme.dark) return;
    activeMode = mode;
    renderPanel();
  }

  function renderPanel() {
    const t = activeTheme;
    const tokens = t[activeMode] || {};

    // Colors
    const bg = tokens.background || '#111';
    const surf = tokens.surface || '#1a1a1a';
    const surfEl = tokens.surfaceElevated || surf;
    const brd = tokens.border || '#333';
    const brdS = tokens.borderSubtle || brd;
    const txt = tokens.textPrimary || '#eee';
    const txt2 = tokens.textSecondary || txt + '99';
    const txtM = tokens.textMuted || txt + '66';
    const acc = tokens.accent || '#888';
    const accH = tokens.accentHover || acc;
    const sidebarBg = tokens.sidebar?.background || surf;
    const radius = tokens.radius === 'lg' ? '12px' : tokens.radius === 'sm' ? '6px' : '8px';
    const fontFamily = tokens.font?.family || 'inherit';
    const success = tokens.success || '#22c55e';
    const warning = tokens.warning || '#f59e0b';
    const error = tokens.error || '#ef4444';

    // Header
    document.getElementById('panel-title').textContent = t.name;
    document.getElementById('panel-desc').textContent = t.description || '';

    // Toolbar theming
    const tb = document.getElementById('panel-toolbar');
    tb.style.background = surf;
    tb.style.borderColor = brd;
    tb.style.color = txt;

    // Mode toggle
    const btns = document.querySelectorAll('.mode-btn');
    btns.forEach(b => {
      b.style.background = 'transparent';
      b.style.color = txt2;
      b.style.borderColor = brd;
    });
    const activeBtn = document.getElementById(activeMode === 'light' ? 'btn-light' : 'btn-dark');
    activeBtn.style.background = acc;
    activeBtn.style.color = '#fff';

    // Light/dark availability
    document.getElementById('btn-light').style.opacity = t.light ? '1' : '0.3';
    document.getElementById('btn-dark').style.opacity = t.dark ? '1' : '0.3';

    // Copy btn
    const cb = document.getElementById('copy-btn');
    cb.style.background = acc + '22';
    cb.style.color = acc;
    cb.style.borderColor = acc + '55';

    // Close btn
    const cl = document.getElementById('panel-close');
    cl.style.color = txt2;
    cl.style.borderColor = brd;

    // Token list for bottom section
    const tokenItems = [
      ['background', bg], ['surface', surf], ['accent', acc],
      ['textPrimary', txt], ['textSecondary', txt2], ['border', brd],
      ['success', success], ['warning', warning], ['error', error],
    ];

    document.getElementById('panel-body').innerHTML = `
      <div class="mock-app" style="font-family:${fontFamily};background:${bg};color:${txt};flex:1;min-height:400px">
        <div class="mock-sidebar" style="background:${sidebarBg};border-color:${brd};color:${txt2}">
          <div class="mock-sidebar-logo" style="color:${txt}">${t.name}</div>
          ${['Dashboard','Analytics','Projects','Settings','Team'].map((item, i) => `
            <div class="mock-nav-item ${i===0?'active':''}" style="background:${i===0?acc+'22':'transparent'};color:${i===0?acc:txt2};border-radius:${radius}">
              <div class="mock-nav-icon" style="background:${i===0?acc:txt2}44"></div>
              ${item}
            </div>
          `).join('')}
        </div>
        <div class="mock-content" style="background:${bg}">
          <div class="mock-content-header">
            <div class="mock-h1" style="color:${txt}">Dashboard</div>
            <div style="display:flex;gap:8px">
              <button class="mock-btn-ghost" style="color:${txt2};border-color:${brd};border-radius:${radius}">Export</button>
              <button class="mock-btn" style="background:${acc};color:#fff;border-radius:${radius}">+ New</button>
            </div>
          </div>

          <div class="mock-cards-row">
            ${[
              ['Total Revenue','$84,230','↑ 12.4%', success],
              ['Active Users','12,453','↑ 8.2%', success],
              ['Open Issues','142','↓ 3.1%', error],
            ].map(([label,val,sub,c]) => `
              <div class="mock-stat-card" style="background:${surf};border-color:${brd};border-radius:${radius}">
                <div class="mock-stat-label" style="color:${txt2}">${label}</div>
                <div class="mock-stat-val" style="color:${txt}">${val}</div>
                <div class="mock-stat-sub" style="color:${c}">${sub}</div>
              </div>
            `).join('')}
          </div>

          <div class="mock-input-row">
            <input class="mock-input" style="background:${surf};border-color:${brd};color:${txt};border-radius:${radius}" placeholder="Search…" readonly />
            <button class="mock-btn" style="background:${acc};color:#fff;border-radius:${radius};flex-shrink:0">Filter</button>
          </div>

          <div class="mock-table" style="border-color:${brd};border-radius:${radius}">
            <div class="mock-table-header" style="background:${surf};border-color:${brd};color:${txt2}">
              <span>Name</span><span>Status</span><span>Role</span><span>Date</span>
            </div>
            ${[
              ['Linear Design', 'Active', 'Admin', 'Jan 12'],
              ['Stripe Config', 'Pending', 'Editor', 'Jan 11'],
              ['Notion Theme', 'Active', 'Viewer', 'Jan 10'],
              ['Apple Style', 'Draft', 'Editor', 'Jan 9'],
            ].map(([name,status,role,date], i) => {
              const statusColor = status==='Active' ? success : status==='Pending' ? warning : status==='Draft' ? txtM : error;
              return `<div class="mock-table-row" style="background:${i%2===0?bg:surf+'44'};border-color:${brdS};color:${txt}">
                <span style="font-weight:500">${name}</span>
                <span><span class="mock-badge" style="background:${statusColor}22;color:${statusColor}">${status}</span></span>
                <span style="color:${txt2}">${role}</span>
                <span style="color:${txtM}">${date}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
      <div class="tokens-section" style="background:${surf};border-color:${brd}">
        <div class="tokens-title" style="color:${txt2}">Design Tokens · ${activeMode}</div>
        <div class="tokens-grid">
          ${tokenItems.map(([name, val]) => `
            <div class="token-item">
              <div class="token-swatch" style="background:${val}"></div>
              <div>
                <div class="token-name" style="color:${txt2}">${name}</div>
                <div class="token-val" style="color:${txt}">${val}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // ── Copy JSON ──
  function copyTokens() {
    if (!activeTheme) return;
    const data = { id: activeTheme.id, name: activeTheme.name, [activeMode]: activeTheme[activeMode] };
    navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(() => {
      showToast('✓ JSON 已复制到剪贴板');
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Events ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderGrid();
    });
  });

  document.getElementById('search-input').addEventListener('input', e => {
    currentSearch = e.target.value;
    renderGrid();
  });

  document.getElementById('overlay').addEventListener('click', closePanel);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePanel();
  });

  init();
</script>
</body>
</html>
